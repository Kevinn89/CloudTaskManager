  verification:
    # build:
    #   context: ../Verification
    #   dockerfile: Dockerfile
    image: verification-service:latest
    container_name: verification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cloud_task_manager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      VERIFICATION_BASE_URL: ${VERIFICATION_BASE_URL:-http://localhost:8080/api/verifications/verify}
      VERIFICATION_RESEND_BASE_URL: ${VERIFICATION_RESEND_BASE_URL:-http://localhost:8080/api/verifications/resend}
      VERIFICATION_TOKEN_VALIDITY: 3m
    ports:
      - "8080:8080"
    networks:
      - cloud-task-manager-network

  notification:
    # build:
    #   context: ../NotificationServiceApplication
    #   dockerfile: Dockerfile
    image: notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      verification:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: user.registered.notifications
      EMAIL_QUEUE: email.queue
      VERIFICATION_API_URL: http://verification:8080/api/verifications
      HOSTNAME: ${NOTIFICATION_HOSTNAME:-cloud-task-manager}
    networks:
      - cloud-task-manager-network

  email:
    # build:
    #   context: ../Email
    #   dockerfile: Dockerfile
    image: emailservice:latest
    container_name: emailservice
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EMAIL_QUEUE: email.queue
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
    networks:
      - cloud-task-manager-network
