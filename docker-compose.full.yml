services:
  postgres:
    image: postgres:16
    container_name: cloud-task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloud_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost:5001/cloud-task-manager:local
    container_name: cloud-task-manager-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloud_task_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-at-least-32-characters}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ../../../frontend/react/CloudTaskManagerReact
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    image: localhost:5001/cloud-task-manager-react:local
    container_name: cloud-task-manager-react
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - ./frontend-nginx.full.conf:/etc/nginx/conf.d/default.conf:ro

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: cloud-task-manager-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    depends_on:
      - registry
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace/cloud-task-manager
      - ../../../frontend/react/CloudTaskManagerReact:/workspace/cloud-task-manager-react
      - ~/.gradle:/root/.gradle
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      DOCKER_REGISTRY: "localhost:5001"
      BACKEND_IMAGE: "localhost:5001/cloud-task-manager"
      FRONTEND_IMAGE: "localhost:5001/cloud-task-manager-react"
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8081}"
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

  registry:
    image: registry:2
    container_name: cloud-task-manager-registry
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry

volumes:
  postgres_data:
  jenkins_home:
  registry_data:
