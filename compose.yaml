services:
  postgres:
    image: postgres:16
    container_name: cloud-task-manager-postgres
    environment:
      POSTGRES_DB: cloud_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: