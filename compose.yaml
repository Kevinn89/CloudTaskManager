services:
  postgres:
    image: postgres:16
    container_name: cloud-task-manager-postgres
    environment:
      POSTGRES_DB: cloud_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  standalone-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-task-manager-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloud_task_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      JWT_SECRET: ${JWT_SECRET}
      # JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_SECRET}
      # JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_SECRET}

      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8081"

volumes:
  postgres_data:
