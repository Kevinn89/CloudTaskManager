
server:
  port: 8080

spring:
  application:
    name: cloud-task-manager

  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:cloud_task_manager_local
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

# Added to configure JWT properties only seems to work when on save hiearchal lvl as application
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
