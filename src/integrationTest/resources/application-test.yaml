spring:
  application:
    name: cloud-task-manager-test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 10000

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7