services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: cloud-task-manager-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace/cloud-task-manager
      - ~/.gradle:/root/.gradle
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      DOCKER_REGISTRY: "localhost:5001"
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    depends_on:
      - registry

  registry:
    image: registry:2
    container_name: cloud-task-manager-registry
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry

  app-testing:
    image: localhost:5001/cloud-task-manager:latest
    container_name: cloud-task-manager-testing
    profiles:
      - testing
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - registry
    environment:
      SPRING_PROFILES_ACTIVE: test
      JWT_SECRET: ${JWT_SECRET:-jenkins-local-registry-test-secret-change-me-32chars}
    ports:
      - "8083:8080"

  app-qa-cert:
    image: localhost:5001/cloud-task-manager:latest
    container_name: cloud-task-manager-qa-cert
    profiles:
      - qa-cert
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - registry
    environment:
      SPRING_PROFILES_ACTIVE: qa-cert
      JWT_SECRET: ${JWT_SECRET:-jenkins-local-registry-qa-cert-secret-change-me-32chars}
    ports:
      - "8084:8080"

volumes:
  jenkins_home:
  registry_data:
