services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: cloud-task-manager-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace/cloud-task-manager
      - ~/.gradle:/root/.gradle
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
volumes:
  jenkins_home:
